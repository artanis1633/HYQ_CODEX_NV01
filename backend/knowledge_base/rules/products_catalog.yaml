naming_rules:
  global_requirements:
    - "NIC names must include family name and full model."
    - "Switch names must include the NVIDIA prefix, family, and full model."
    - "Transceiver names must include speed, optical type, and port type."
    - "Cable names must include the NVIDIA prefix, speed, cable type, and length."
    - "Use canonical spacing, capitalization, and hyphenation."
  canonical_port_types:
    - name: "OSFP"
      forbidden_aliases: ["ospf", "OSPF"]
      notes: "OSPF is a routing protocol, not a port type."
    - name: "QSFP56"
      forbidden_aliases: ["qsfp56"]
    - name: "QSFP28"
      forbidden_aliases: ["qsfp28"]
    - name: "QSFP+"
      forbidden_aliases: ["qsfp+"]

family_alias_rules:
  nic_families:
    - family: "ConnectX-8"
      forbidden_aliases: ["ConnectX8", "CX8", "CX-8", "CX 8"]
    - family: "ConnectX-7"
      forbidden_aliases: ["ConnectX7", "CX7", "CX-7", "CX 7"]
    - family: "ConnectX-6 Lx"
      forbidden_aliases: ["ConnectX6Lx", "CX6Lx", "CX-6 Lx"]
    - family: "ConnectX-6"
      forbidden_aliases: ["ConnectX6", "CX6", "CX-6", "CX 6"]
  switch_families:
    - family: "NVIDIA Quantum-2"
      forbidden_aliases: ["Quantum2", "Q2", "Quantum 2"]
    - family: "NVIDIA Quantum"
      forbidden_aliases: ["Quantum", "Q"]
    - family: "NVIDIA Spectrum-X"
      forbidden_aliases: ["SpectrumX", "SX", "Spectrum X"]
    - family: "NVIDIA Spectrum-3"
      forbidden_aliases: ["Spectrum3", "S3", "Spectrum 3"]
  transceiver_models:
    - full_model: "400G DR4 OSFP"
      forbidden_aliases: ["400G模块", "DR4", "OSFP模块"]
    - full_model: "200G FR4 QSFP56"
      forbidden_aliases: ["200G模块", "FR4", "QSFP56模块"]
    - full_model: "100G SR4 QSFP28"
      forbidden_aliases: ["100G模块", "SR4", "QSFP28模块"]
  cable_models:
    - full_model: "NVIDIA 400G AOC"
      forbidden_aliases: ["400G AOC", "AOC线缆"]
    - full_model: "NVIDIA 200G DAC"
      forbidden_aliases: ["200G DAC", "DAC线缆"]
  explicit_model_rules:
    - canonical_reference: "NVIDIA Quantum-2 QM9700"
      forbidden_aliases: ["QM9700"]
      notes: "The family prefix must be present."
    - canonical_reference: "NVIDIA Spectrum-X SN4600"
      forbidden_aliases: ["SN4600"]
      notes: "The family prefix must be present."
    - canonical_reference: "Length-bearing cable names"
      forbidden_aliases: ["5m线缆"]
      notes: "Length cannot appear without the canonical cable model."

