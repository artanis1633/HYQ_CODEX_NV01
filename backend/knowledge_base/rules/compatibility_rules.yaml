validation_rules:
  speed_matching:
    allowed_pairs:
      - device_speed: "400G"
        compatible_speeds: ["400G"]
        notes: "No downshift support is documented."
      - device_speed: "200G"
        compatible_speeds: ["200G", "100G"]
        notes: "100G is supported but not recommended."
      - device_speed: "100G"
        compatible_speeds: ["100G"]
        notes: "Exact speed only."
    discouraged_pairs:
      - "200G NIC <-> 100G switch"
      - "400G NIC <-> 200G switch unless a special adapter path is explicitly validated"

  port_capacity:
    minimum_reserved_ports:
      mode: "max"
      values:
        percent: 10
        absolute_ports: 2
    formulas:
      required_switch_ports: "(nic_port_count_per_server * server_count) * (1 + redundancy_ratio)"
      recommended_redundancy_ratio_range: "10% - 20%"
    examples:
      - scenario: "8 servers with 2x400G NIC ports each"
        computed_required_ports: "8 * 2 * 1.1 = 17.6"
        recommended_switch_port_budget: 20
      - scenario: "16 servers with 2x200G NIC ports each"
        computed_required_ports: "16 * 2 * 1.15 = 36.8"
        recommended_switch_port_budget: 40

  high_availability:
    n_plus_one_rules:
      - device_type: "switch"
        rule: "Required switch count + 1 spare unit."
      - device_type: "management_nic"
        rule: "At least 2 management ports per server."
      - device_type: "data_nic"
        rule: "At least 2 data NICs per server for critical workloads."
    architecture_rules:
      - architecture_type: "fat_tree"
        rule: "At least two switch layers with N+1 redundancy per layer."
      - architecture_type: "clos"
        rule: "Both spine and leaf layers require redundancy."
      - architecture_type: "direct_connect"
        rule: "Dual NICs, each connected to a different switch."

validation_checklist:
  - "Verify GPU to NIC family compatibility."
  - "Verify interconnect mode alignment."
  - "Verify NIC to switch port type compatibility."
  - "Verify NIC to switch speed compatibility."
  - "Verify transceiver to NIC and switch compatibility."
  - "Verify cable type, speed, and length constraints."
  - "Verify switch port capacity and redundancy budget."
  - "Verify high-availability design rules."
